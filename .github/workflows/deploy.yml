name: CI/CD DevOps AWS

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test Flask App
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements.txt

      - name: Verificar importación de Flask
        run: |
          python -c "import flask; print('Flask importado correctamente')"

      - name: Verificar archivo app.py
        run: |
          python -m py_compile docker/app.py

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Crear paquete de aplicación
        run: |
          cd docker
          zip -r ../mi-app.zip .

      - name: Obtener ID de cuenta
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Subir aplicación a S3
        run: |
          aws s3 cp mi-app.zip s3://devops-bucket-${{ steps.account.outputs.account_id }}/mi-app.zip

      - name: Obtener instancia EC2 creada por CloudFormation
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=devops-ec2-cloudformation" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Instancia encontrada: $INSTANCE_ID"

      - name: Ejecutar comando de despliegue por SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=${{ steps.ec2.outputs.instance_id }}" \
            --parameters 'commands=[
              "echo Despliegue iniciado desde GitHub Actions",
              "aws s3 cp s3://devops-bucket-${{ steps.account.outputs.account_id }}/mi-app.zip /tmp/mi-app.zip",
              "mkdir -p /home/ec2-user/app-devops",
              "unzip -o /tmp/mi-app.zip -d /home/ec2-user/app-devops",
              "echo Despliegue completado correctamente"
            ]' \
            --region us-east-1
